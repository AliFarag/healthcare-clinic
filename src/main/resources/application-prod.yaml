spring:
  datasource:
    url: ${DATASOURCE_URL:jdbc:mysql://localhost:3306/clinicdb?useSSL=true&serverTimezone=UTC}
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  devtools:
    restart:
      enabled: false

springdoc:
  swagger-ui:
    enabled: false  # Disable Swagger in production

logging:
  level:
    com.clinic: INFO
    root: WARN
  file:
    name: /var/log/healthcare-clinic/app.log